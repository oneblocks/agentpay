<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentPay | The Agent Economy Payment Layer</title>
    <meta name="description" content="AgentPay 是去中心化智能体经济的支付基础设施。">
    <script src="./config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #050608;
            --card-bg: rgba(17, 19, 26, 0.7);
            --accent-color: #836efb;
            --accent-glow: rgba(131, 110, 251, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #f43f5e;
            --border: rgba(255, 255, 255, 0.08);
            --primary-gradient: linear-gradient(135deg, #836efb 0%, #a78bfa 100%);
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            /* 网格背景，增加科技感 */
            background-image:
                radial-gradient(circle at 0% 0%, rgba(131, 110, 251, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- 导航栏 --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 6, 8, 0.5);
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            background: var(--primary-gradient);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .balance-pill {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 6px 14px;
            border-radius: 12px;
            font-family: 'Fira Code';
            font-size: 0.85rem;
            color: var(--success);
            font-weight: 600;
        }

        /* --- 核心按钮 --- */
        .btn {
            border: none;
            border-radius: 14px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
            filter: brightness(1.1);
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-exit {
            color: var(--error);
            border-color: rgba(244, 63, 94, 0.2);
        }

        .btn-exit:hover {
            background: rgba(244, 63, 94, 0.1);
        }

        /* --- 抽屉与弹窗 --- */
        .drawer {
            position: fixed;
            top: 0;
            right: -440px;
            width: 420px;
            height: 100vh;
            background: rgba(13, 15, 20, 0.95);
            border-left: 1px solid var(--border);
            z-index: 250;
            padding: 40px 30px;
            overflow-y: auto;
            backdrop-filter: blur(30px);
            transition: right 0.4s ease;
        }

        .drawer.active {
            right: 0;
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: #11131a;
            border-radius: 28px;
            padding: 35px;
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
        }

        /* --- 自动支付控制区 --- */
        .session-ctrl-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* --- 主交互容器 --- */
        .hero-section {
            text-align: center;
            padding: 80px 20px 40px;
        }

        .hero-section h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, rgba(255, 255, 255, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 12px;
            border: 1px solid var(--border);
            display: flex;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s;
        }

        .input-card:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(131, 110, 251, 0.15);
        }

        .input-card input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 25px;
            color: white;
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* --- AI 报告增强 --- */
        .report-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 50px;
            display: none;
            position: relative;
            max-width: 900px;
            margin: 0 auto 80px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .report-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }

        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .markdown-body {
            color: #cbd5e1;
            line-height: 1.9;
            font-size: 1.1rem;
        }

        .markdown-body h3 {
            color: #fff;
            font-size: 1.6rem;
            margin-top: 40px;
        }

        .markdown-body b {
            color: var(--accent-color);
            background: rgba(131, 110, 251, 0.15);
            padding: 0 6px;
            border-radius: 4px;
        }

        /* --- 动画 --- */
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-up {
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 登录页重构 */
        .login-view {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-glass {
            background: rgba(17, 19, 26, 0.8);
            border: 1px solid var(--border);
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 480px;
        }

        /* --- 节点市场折叠面板 --- */
        .node-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 18px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .node-header {
            padding: 18px 22px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .node-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .node-body {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            display: none;
            font-size: 0.85rem;
        }

        .node-item.open .node-body {
            display: block;
        }

        .status-pill {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .status-pill.online {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* --- 滚动条 --- */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <!-- 全局加载层 -->
    <div id="appLoader"
        style="position:fixed; inset:0; background:var(--bg-color); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:24px;">
        <div class="logo-icon" style="width:70px; height:70px; font-size:2rem; border-radius:22px;">AP</div>
        <div class="spinner" style="width:30px; height:30px; border-width:3px;"></div>
    </div>

    <!-- 登录视图 -->
    <div id="viewLogin" class="login-view" style="display:none;">
        <div class="login-glass animate-up">
            <div class="logo-icon"
                style="margin: 0 auto 30px; width: 64px; height: 64px; font-size: 1.8rem; border-radius: 18px;">AP</div>
            <h2 style="font-size: 2.2rem; font-weight: 800; margin-bottom: 10px;">AgentPay</h2>
            <p style="color: var(--text-dim); margin-bottom: 50px;">智能体经济的支付基础设施</p>

            <button class="btn btn-primary btn-wallet"
                style="width:100%; height:60px; font-size:1.05rem; justify-content:center;"
                onclick="connect('metamask')">
                <img src="./metamask.png" class="wallet-logo-img"> 连接加密钱包
            </button>
            <button class="btn btn-ghost btn-wallet"
                style="width:100%; height:60px; font-size:1.05rem; justify-content:center; margin-top:16px;"
                onclick="connect('okx')">
                <img src="./okx.png" class="wallet-logo-img"> 使用 OKX Wallet
            </button>
        </div>
    </div>

    <!-- 主业务视图 -->
    <div id="viewMain" style="display:none;">
        <nav>
            <a href="#" class="logo-group">
                <div class="logo-icon">AP</div>
                <span class="logo-text">AgentPay</span>
            </a>
            <div class="nav-right">
                <div id="sessionStatus" class="session-ctrl-card" style="display:none;">
                    <span style="font-size:0.75rem; font-weight:700; color:var(--text-dim);">自动模式</span>
                    <label style="position:relative; display:inline-block; width:40px; height:22px;">
                        <input type="checkbox" id="autoPayToggle" onchange="toggleAutoPay()"
                            style="opacity:0; width:0; height:0;">
                        <span
                            style="position:absolute; cursor:pointer; inset:0; background:#333; border-radius:30px; transition:0.3s;"
                            id="sliderBg"></span>
                        <span
                            style="position:absolute; content:''; height:16px; width:16px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.3s;"
                            id="sliderDot"></span>
                    </label>
                </div>
                <div class="balance-pill" id="usdcBalance">0.00 USDC</div>
                <div id="mainAddr"
                    style="font-family:'Fira Code'; font-size:0.85rem; padding:8px 16px; background:rgba(255,255,255,0.05); border-radius:12px; border:1px solid var(--border);">
                    0x...</div>
                <button class="btn btn-ghost" onclick="toggleDrawer()" style="padding:10px;"><svg width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" />
                    </svg></button>
                <button class="btn btn-ghost btn-exit" onclick="logout()">🚪 退出</button>
            </div>
        </nav>

        <main class="main-container">
            <section class="hero-section">
                <h1 class="animate-up">你想执行什么任务？</h1>
                <p style="color:var(--text-dim); font-size:1.2rem; font-weight:500; margin-bottom:40px;"
                    class="animate-up">AgentPay — The Payment Layer for the Agent Economy.</p>

                <div class="input-card animate-up">
                    <input id="query" placeholder="描述您的指令，例如：分析 Monad 生态的发展前景...">
                    <button class="btn btn-primary" id="runBtn" onclick="runFlow()"
                        style="height:54px; padding:0 30px; font-size:1rem;">RUN</button>
                </div>

                <!-- 步骤式流水日志 -->
                <div id="logStream"
                    style="max-width:800px; margin: 0 auto 30px; text-align: left; display:none; padding:20px; background:rgba(255,255,255,0.02); border-radius:16px; border:1px solid var(--border);">
                </div>
            </section>

            <!-- 报告展示区 -->
            <section class="report-card animate-up" id="reportArea">
                <div class="report-header">
                    <div class="agent-avatar">✦</div>
                    <div>
                        <div style="font-size:0.7rem; color:var(--text-dim); font-weight:800; letter-spacing:1px;">AI
                            INTELLIGENCE REPORT</div>
                        <div id="reportAgentName" style="font-weight:800; font-size:1.2rem;">Kimi 智能助手</div>
                    </div>
                    <button class="btn btn-ghost" style="margin-left:auto; font-size:0.75rem; padding:8px 16px;"
                        onclick="copyReport()">复制全文</button>
                </div>

                <div class="markdown-body" id="reportText"></div>

                <div
                    style="margin-top:50px; padding-top:25px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                    <span id="nodeInfo" style="font-size:0.8rem; color:var(--text-dim); font-weight:600;"></span>
                    <a id="txLink" href="#" target="_blank"
                        style="color:var(--accent-color); font-weight:700; text-decoration:none; display:flex; align-items:center; gap:6px; background:rgba(131, 110, 251, 0.1); padding:8px 16px; border-radius:12px;">验证链上凭证
                        ↗</a>
                </div>
            </section>
        </main>
    </div>

    <!-- 侧边抽屉 -->
    <div class="drawer" id="marketDrawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h3 style="margin:0; font-weight:800;">服务管理控制台</h3>
            <span style="cursor:pointer; font-size:1.5rem;" onclick="toggleDrawer()">✕</span>
        </div>

        <button class="btn btn-primary" style="width:100%; justify-content:center; padding:16px; margin-bottom:30px;"
            onclick="toggleModal('regModal', true)">接入 Agent 服务</button>

        <div
            style="font-size:0.75rem; font-weight:800; color:var(--text-dim); margin-bottom:15px; text-transform:uppercase;">
            在线节点列表</div>
        <div id="servicesList"></div>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="regModal">
        <div class="modal animate-up">
            <h3 style="margin-top:0; color:var(--accent-color); font-weight:800; font-size:1.4rem;">接入 Agent 服务</h3>
            <div style="margin-top:25px; display:grid; gap:18px;">
                <div><label style="font-size:0.7rem; font-weight:800; color:var(--text-dim);">服务名称</label><input
                        id="regName"
                        style="width:100%; padding:12px; background:#000; border:1px solid var(--border); border-radius:10px; color:white; margin-top:6px;">
                </div>
                <div><label style="font-size:0.7rem; font-weight:800; color:var(--text-dim);">价格 (USDC
                        微单位)</label><input id="regPrice" placeholder="1000000 = 1 USDC"
                        style="width:100%; padding:12px; background:#000; border:1px solid var(--border); border-radius:10px; color:white; margin-top:6px;">
                </div>
                <div><label style="font-size:0.7rem; font-weight:800; color:var(--text-dim);">收款钱包地址</label><input
                        id="regAddr"
                        style="width:100%; padding:12px; background:#000; border:1px solid var(--border); border-radius:10px; color:white; margin-top:6px;">
                </div>
                <div><label style="font-size:0.7rem; font-weight:800; color:var(--text-dim);">API URL</label><input
                        id="regUrl"
                        style="width:100%; padding:12px; background:#000; border:1px solid var(--border); border-radius:10px; color:white; margin-top:6px;">
                </div>
            </div>
            <div style="display:flex; gap:12px; margin-top:30px;">
                <button class="btn btn-ghost" style="flex:1; justify-content:center;"
                    onclick="toggleModal('regModal', false)">取消</button>
                <button class="btn btn-primary" style="flex:2; justify-content:center;"
                    onclick="registerNode()">确认发布</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心 JS 逻辑同步（保持你原有的功能 ID 和变量） ---
        const ERC20_ABI = ["function transfer(address to, uint256 amount) public returns (bool)", "function balanceOf(address owner) public view returns (uint256)", "function decimals() public view returns (uint8)"];
        let currentSigner, userAddress, usdcContract;

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
        function toggleDrawer() { document.getElementById('marketDrawer').classList.toggle('active'); if (document.getElementById('marketDrawer').classList.contains('active')) loadMarket(); }

        // 模拟自动支付按钮视觉效果
        function toggleAutoPay() {
            const dot = document.getElementById('sliderDot');
            const bg = document.getElementById('sliderBg');
            const checked = document.getElementById('autoPayToggle').checked;
            dot.style.transform = checked ? 'translateX(18px)' : 'translateX(0)';
            bg.style.background = checked ? 'var(--success)' : '#333';
        }

        async function connect(type) {
            let provider;
            if (type === 'okx') provider = window.okxwallet;
            else provider = window.ethereum?.providers ? window.ethereum.providers.find(p => p.isMetaMask) : window.ethereum;

            if (!provider) return alert(`${type} 钱包未安装!`);
            try {
                const accounts = await provider.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                const browserProvider = new ethers.BrowserProvider(provider);
                currentSigner = await browserProvider.getSigner();
                await currentSigner.signMessage(`AgentPay Login\nTimestamp: ${Date.now()}`);

                usdcContract = new ethers.Contract(AGENT_CONFIG.USDC_ADDRESS, ERC20_ABI, currentSigner);
                document.getElementById('appLoader').style.display = 'none';
                document.getElementById('viewLogin').style.display = 'none';
                document.getElementById('viewMain').style.display = 'block';
                document.getElementById('mainAddr').innerText = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
                updateBalance();
                await provider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: AGENT_CONFIG.CHAIN_ID }] }).catch(e => { });
            } catch (e) { alert("登录失败"); document.getElementById('appLoader').style.display = 'none'; }
        }

        async function updateBalance() {
            try {
                const bal = await usdcContract.balanceOf(userAddress);
                const dec = await usdcContract.decimals();
                document.getElementById('usdcBalance').innerText = parseFloat(ethers.formatUnits(bal, dec)).toFixed(2) + " USDC";
            } catch (e) { }
        }

        function renderMD(text) {
            return String(text)
                .replace(/###\s?(.*)/g, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\\n/g, '<br>').replace(/\n/g, '<br>')
                .replace(/^\s*-\s(.*)/gm, '<li>$1</li>');
        }

        async function runFlow() {
            const query = document.getElementById('query').value;
            const log = document.getElementById('logStream');
            const report = document.getElementById('reportArea');
            if (!query) return;

            log.style.display = 'block';
            log.innerHTML = `<div style="display:flex; align-items:center; gap:12px; color:var(--accent-color)"><div class="spinner"></div> 正在路由 Monad 节点市场并预估费用...</div>`;
            report.style.display = 'none';

            try {
                const sRes = await fetch(`${AGENT_CONFIG.BACKEND_URL}/services`);
                const services = await sRes.json();
                if (!services || services.length === 0) throw new Error("没有可用服务节点");

                const target = services[0];
                const decimals = await usdcContract.decimals();
                const amount = ethers.parseUnits((target.pricing.price / 1000000).toString(), decimals);

                log.innerHTML = `<div style="color:var(--success)">✓ 匹配成功: [${target.name}] | 计费: ${target.pricing.price / 1000000} USDC</div><div style="margin-top:8px;">> 正在请求 Monad 链上支付签名...</div>`;

                const tx = await usdcContract.transfer(target.recipient, amount);
                log.innerHTML += `<div style="margin-top:8px; color:var(--text-dim)">> 交易已广播! Hash: ${tx.hash.slice(0, 20)}...</div><div>> 等待网络区块确认...</div>`;
                await tx.wait();

                log.innerHTML += `<div style="margin-top:8px; color:var(--success)">✓ 支付结算成功! Agent 正在思考中...</div>`;

                const res = await fetch(`${AGENT_CONFIG.BACKEND_URL}/auto-call`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ capability: query, payload: { query: query }, txHash: tx.hash })
                });

                const data = await res.json();
                log.style.display = 'none';
                report.style.display = 'block';
                document.getElementById('reportText').innerHTML = `<h3>分析报告</h3>` + renderMD(data.result?.result || data.result);
                document.getElementById('reportAgentName').innerText = target.name;
                document.getElementById('nodeInfo').innerText = `Provider: ${target.name} · Verified Node`;
                document.getElementById('txLink').href = `${AGENT_CONFIG.EXPLORER_URL}tx/${tx.hash}`;
                updateBalance();
            } catch (err) {
                log.innerHTML = `<div style="color:var(--error); font-weight:700;">❌ 执行失败: ${err.message || "没有可用服务节点"}</div>`;
            }
        }

        async function loadMarket() {
            try {
                const res = await fetch(`${AGENT_CONFIG.BACKEND_URL}/services`);
                const data = await res.json();
                let h = "";
                data.forEach((s, idx) => {
                    h += `
                    <div class="node-item" id="node-${idx}">
                        <div class="node-header" onclick="this.parentElement.classList.toggle('open')">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="status-pill online"></div>
                                <span style="font-weight:700;">${s.name}</span>
                            </div>
                            <span style="font-size:0.7rem; color:var(--success)">${s.pricing.price / 1000000} USDC ▼</span>
                        </div>
                        <div class="node-body">
                            <div style="margin-bottom:10px; color:var(--text-dim)">Endpoint: <code style="color:var(--accent-color)">${s.endpoint}</code></div>
                            <button class="btn btn-exit" style="width:100%; font-size:0.75rem; justify-content:center;" onclick="deleteNode('${s.name}')">下线 Agent 服务</button>
                        </div>
                    </div>`;
                });
                document.getElementById('servicesList').innerHTML = h || "暂无在线服务";
            } catch (e) { }
        }

        async function registerNode() {
            const payload = {
                name: document.getElementById('regName').value,
                endpoint: document.getElementById('regUrl').value,
                recipient: document.getElementById('regAddr').value,
                pricing: { price: parseInt(document.getElementById('regPrice').value) },
                capabilities: ["generic"]
            };
            await fetch(`${AGENT_CONFIG.BACKEND_URL}/register`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
            toggleModal('regModal', false);
            loadMarket();
        }

        async function deleteNode(n) {
            if (confirm(`确定注销服务节点 ${n} ?`)) {
                await fetch(`${AGENT_CONFIG.BACKEND_URL}/service/${n}`, { method: "DELETE" });
                loadMarket();
            }
        }

        function copyReport() {
            navigator.clipboard.writeText(document.getElementById('reportText').innerText).then(() => alert("报告已复制到剪贴板"));
        }

        function logout() { location.reload(); }

        // 初始化检测
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (!userAddress) {
                    document.getElementById('appLoader').style.display = 'none';
                    document.getElementById('viewLogin').style.display = 'flex';
                }
            }, 1000);
        });
    </script>
</body>

</html>
